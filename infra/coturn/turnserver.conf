# coturn TURN server for AtomQuest.
# TLS is terminated by Caddy's layer4 on 443, which forwards decrypted (plain)
# TURN to this server on 3478 — so coturn runs no TLS stack of its own.
#
# No external-ip is set: coturn advertises relay candidates on its own container
# address, which the co-located LiveKit SFU reaches directly over the Docker
# network (no NAT hairpin, no relay-port publishing). The long-term credential is
# supplied at runtime via --user so it is not committed.

listening-port=3478
listening-ip=0.0.0.0

realm=api.thefoyers.club
fingerprint
lt-cred-mech

# Caddy already provides TLS on 443; coturn itself is plaintext on the internal net.
no-tls
no-dtls
no-cli
no-multicast-peers

# Relay port range (reached internally by the SFU; not published to the host).
min-port=49152
max-port=49200

# Log allocations to stdout so docker logs shows TURN activity.
log-file=stdout
verbose
