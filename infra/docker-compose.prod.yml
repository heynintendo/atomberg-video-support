name: atomquest-prod

# Production stack on a single Hetzner box. Caddy owns 443 (API + LiveKit
# signaling + the test web client) and 5349 (TURN over TLS, via the layer4
# plugin). Postgres, Redis, the API, and LiveKit signaling are internal-only;
# only the LiveKit RTC UDP media range is published directly. Egress runs with a
# hard CPU/memory cap so recording can never starve the live call.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # Full config via env so the TURN credential and API keys interpolate from
    # infra/.env (nothing committed). Embedded TURN is OFF; clients are pointed at
    # the standalone coturn (advertised as turns:api.thefoyers.club:443).
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        prometheus_port: 6789
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
          turn_servers:
            - host: api.thefoyers.club
              port: 5349
              protocol: tls
              username: atomquest
              credential: ${TURN_PASSWORD}
        redis:
          address: redis:6379
        turn:
          enabled: false
        keys:
          ${LIVEKIT_API_KEY}: "${LIVEKIT_API_SECRET}"
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://api:8080/api/webhooks/livekit
        logging:
          level: info
          json: false
    ports:
      - "50000-50100:50000-50100/udp"   # RTC media (UDP)
      - "127.0.0.1:6789:6789"           # Prometheus metrics (localhost only)

  coturn:
    image: coturn/coturn:4.6.2
    restart: unless-stopped
    depends_on:
      - livekit
    # Plain TURN on 3478 (internal); TLS terminated by Caddy on 443. The long-term
    # credential is passed at runtime so it is not committed.
    command:
      - turnserver
      - -c
      - /etc/coturn/turnserver.conf
      - --user=atomquest:${TURN_PASSWORD}
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  egress:
    image: livekit/egress:v1.13.0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        log_level: info
    volumes:
      - egress_output:/out
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    # Isolated by a hard resource cap: recording can never starve the live call.
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 4g

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_PUBLIC_URL: ${LIVEKIT_PUBLIC_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      SEED_AGENTS: ${SEED_AGENTS:-}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 24

  caddy:
    build:
      context: ./caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      livekit:
        condition: service_started
    environment:
      ACME_CA: ${ACME_CA}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "5349:5349"      # TURN over TLS (terminated by Caddy layer4 -> coturn)
    volumes:
      - ./caddy/caddy.json:/etc/caddy/caddy.json:ro
      - ../apps/web/dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]

volumes:
  postgres_data:
  egress_output:
  caddy_data:
  caddy_config:
