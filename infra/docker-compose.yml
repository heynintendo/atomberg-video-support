name: atomquest

# Media spine + backend. The web app is deployed separately (Vercel) and runs
# locally via the Vite dev server, so it is intentionally not a compose service.
#
# Service map:
#   postgres  persistence
#   redis     message bus required by LiveKit <-> Egress
#   livekit   self-hosted SFU + built-in TURN (NAT traversal)
#   egress    isolated recording worker (never shares the live-call process)
#   api       Fastify backend (tokens, room service, webhooks)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  livekit:
    image: livekit/livekit-server:v1.13.1
    restart: unless-stopped
    command: ["--config", "/etc/livekit.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    # API key/secret are injected here (LIVEKIT_KEYS) rather than committed in
    # livekit.yaml. Format is "key: secret".
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    ports:
      - "7880:7880"                      # signaling (HTTP/WS)
      - "7881:7881"                      # RTC over TCP (fallback)
      - "3478:3478/udp"                  # built-in TURN (UDP, local)
      - "50000-50019:50000-50019/udp"    # RTC media (small dev range)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  egress:
    image: livekit/egress:v1.13.0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    # Config is provided inline so the LiveKit secret is interpolated from the
    # environment at runtime and never written to a committed file.
    environment:
      EGRESS_CONFIG_BODY: |
        redis:
          address: redis:6379
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true
        log_level: info
    volumes:
      - egress_output:/out
    # Chrome (room-composite) needs shared memory and a relaxed seccomp profile.
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN}
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 24

volumes:
  postgres_data:
  egress_output:
