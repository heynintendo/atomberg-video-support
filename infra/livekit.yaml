# LiveKit SFU configuration.
# API keys are injected from the environment (LIVEKIT_KEYS) so no secret is
# committed to the repository.

port: 7880

rtc:
  tcp_port: 7881
  # Small media port range for local development; matches the published range in
  # docker-compose.yml. Widened for the deploy phase.
  port_range_start: 50000
  port_range_end: 50019
  use_external_ip: false

redis:
  address: redis:6379

turn:
  # Built-in TURN for NAT traversal. Locally we expose UDP only. TURN-over-TLS on
  # 5349 (external_tls, terminated with Caddy's certificate) is wired in Phase 2.
  enabled: true
  domain: localhost
  udp_port: 3478

logging:
  level: info
  json: false
