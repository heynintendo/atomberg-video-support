# LiveKit SFU configuration.
# API keys are injected from the environment (LIVEKIT_KEYS) so no secret is
# committed to the repository.

port: 7880

# Node-level metrics (bytes/packets forwarded, participant counts) used as
# server-side evidence that media is relayed through the SFU.
prometheus_port: 6789

rtc:
  tcp_port: 7881
  # Small media port range for local development; matches the published range in
  # docker-compose.yml. Widened for the deploy phase.
  port_range_start: 50000
  port_range_end: 50019
  use_external_ip: false

redis:
  address: redis:6379

turn:
  # Built-in TURN for NAT traversal. Locally we expose UDP only. TURN-over-TLS on
  # 5349 (external_tls, terminated with Caddy's certificate) is wired in Phase 2.
  enabled: true
  domain: localhost
  udp_port: 3478

webhook:
  api_key: devkey
  # Local dev: the API runs on the host (tsx); the SFU reaches it via the Docker
  # Desktop host alias. In production the SFU posts to the api service directly.
  urls:
    - http://host.docker.internal:8080/api/webhooks/livekit

logging:
  level: info
  json: false
